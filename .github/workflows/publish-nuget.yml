name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 1.0.0 or 1.0.0-preview.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/GoogleAdk/GoogleAdk.csproj

      - name: Pack
        # GoogleAdk pack bundles satellite assemblies via targets that depend on Build; --no-build is not supported (NETSDK1085).
        run: dotnet pack src/GoogleAdk/GoogleAdk.csproj --configuration Release --output ./artifacts -p:PackageVersion=${{ github.event.inputs.version }}

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
