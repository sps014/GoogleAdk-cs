site_name: Google ADK for .NET
site_url: https://sps014.github.io/GoogleAdk-cs/
repo_url: https://github.com/sps014/GoogleAdk-cs
repo_name: sps014/GoogleAdk-cs

theme:
  name: material
  font:
    text: Roboto
    code: Roboto Mono
  logo: https://adk.dev/assets/agent-development-kit.png
  favicon: https://adk.dev/assets/agent-development-kit.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: white
      accent: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: grey
      accent: grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.tabs
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - toc:
      permalink: true

nav:
