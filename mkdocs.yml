site_name: Google ADK for .NET
site_url: https://sps014.github.io/GoogleAdk-cs/
repo_url: https://github.com/sps014/GoogleAdk-cs
repo_name: sps014/GoogleAdk-cs

theme:
  name: material
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/agent-development-kit.png
  favicon: assets/agent-development-kit.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Features:
    - Features Overview: features.md
    - Running Agents: running-agents.md
    - Orchestration: orchestration.md
    - State: state.md
    - Memory: memory.md
    - Planning: planning.md
    - Caching: caching.md
    - Streaming: streaming.md
  - Tools & Integrations:
    - Tools Overview: tools.md
    - Google Search Tool: google-search-tool.md
    - Vertex AI Search Tool: vertex-ai-search-tool.md
    - Computer Use Tool: computer-use-tool.md
    - BigQuery Tools: bigquery-tools.md
    - Cloud Spanner Tools: spanner-tools.md
    - Agent Tool: agent-tool.md
    - Auth Tool: auth-tool.md
    - Bigtable Query Tool: bigtable-query-tool.md
    - Pub/Sub Message Tool: pubsub-message-tool.md
    - Google API Tool: google-api-tool.md
    - API Hub Tool: api-hub-tool.md
    - Discovery Engine Search Tool: discovery-engine-search-tool.md
    - Vertex AI RAG Retrieval Tool: vertex-ai-rag-retrieval-tool.md
    - Human in the Loop: human-in-the-loop.md
    - Code Execution: code-execution.md
    - Model Context Protocol (MCP): mcp.md
    - Artifact Handling: artifacts.md
  - Models & Connectivity:
    - Models: models.md
    - Agent-to-Agent (A2A): a2a.md
    - Output Schema: output-schema.md
  - Advanced Topics:
